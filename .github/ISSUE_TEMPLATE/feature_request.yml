name: Feature request
description: Suggest a focused improvement to the package.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What are you trying to do, and where does the package fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workaround or alternative you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, sample markdown, or screenshots if relevant.
